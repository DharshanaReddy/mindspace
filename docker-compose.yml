version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mindspace
      POSTGRES_USER: mindspace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindspace_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindspace"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=mindspace
      - DATABASE_URL=postgresql+asyncpg://mindspace:${POSTGRES_PASSWORD:-mindspace_dev}@postgres:5432/mindspace
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
